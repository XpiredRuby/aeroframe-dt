name: Install verified software completion payload

on:
  push:
    branches: [main]
    paths:
      - '.software_sync/**'
      - '.github/workflows/software-sync.yml'
  pull_request:
    branches: [main]
    paths:
      - '.software_sync/**'
      - '.github/workflows/software-sync.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install payload
        run: python .software_sync/install_payload.py
      - name: Verify complete software tree
        run: |
          python -m pip install -e .
          python -m unittest discover -s tests -v
          python tools/check_traceability.py
          python tools/audit_release.py .
      - name: Commit verified software completion
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Complete AeroFrame-DT software platform"
          git push origin HEAD:main
