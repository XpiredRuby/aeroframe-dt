name: analytical-ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m unittest discover -s tests -v
      - run: python tools/check_traceability.py
      - run: python tools/run_load_model.py examples/synthetic_load_case.json > /tmp/load_manifest.json
      - run: python tools/run_hand_calcs.py examples/synthetic_hand_calc_case.json > /tmp/hand_manifest.json
