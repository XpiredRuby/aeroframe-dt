name: Install verified software completion payload

on:
  push:
    branches: [main]
    paths:
      - '.software_sync/**'
      - '.github/workflows/software-sync.yml'
  pull_request:
    branches: [main]
    paths:
      - '.software_sync/**'
      - '.github/workflows/software-sync.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install payload
        run: python .software_sync/install_payload.py
      - name: Install package
        run: python -m pip install -e .
      - name: Run unit tests
        shell: bash
        run: |
          set -o pipefail
          python -m unittest discover -s tests -v 2>&1 | tee unit-test.log
      - name: Upload unit-test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: software-completion-unit-test-log
          path: unit-test.log
      - name: Check traceability
        run: python tools/check_traceability.py
      - name: Audit release
        run: python tools/audit_release.py .
      - name: Commit verified software completion
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Complete AeroFrame-DT software platform"
          git push origin HEAD:main
